<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเข้าสู่ระบบ - จัดการข้อมูลน้ำ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --gov-blue: #003366;
      --gov-gold: #c5a059;
      --gov-light-blue: #f0f5ff;
    }
    body {
      background: linear-gradient(135deg, var(--gov-blue) 0%, #004080 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      font-family: 'Sarabun', sans-serif;
    }
    .card {
      border: 4px solid var(--gov-gold);
      border-radius: 0;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }
    .card-header {
      background: #ffffff;
      color: var(--gov-blue);
      border-bottom: 2px solid var(--gov-gold);
      padding: 1.5rem;
      text-align: center;
      font-weight: bold;
      font-size: 1.4rem;
    }
    .gov-crest {
      width: 80px;
      margin-bottom: 1rem;
    }
    .btn-primary {
      background-color: var(--gov-blue);
      border-color: var(--gov-blue);
      border-radius: 0;
      padding: 0.8rem;
      font-weight: bold;
    }
    .btn-primary:hover {
      background-color: #002244;
    }
    .form-control {
      border-radius: 0;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card">
          <div class="card-header">
            <div class="text-center">
              <i class="bi bi-shield-shaded" style="font-size: 3rem; color: var(--gov-blue);"></i>
            </div>
            <div class="mt-2">ระบบข้อมูลโทรมาตรอัตโนมัติ</div>
            <div style="font-size: 0.9rem; font-weight: normal; color: #666;">เพื่อการพยากรณ์น้ำและเตือนภัย</div>
          </div>
          <div class="card-body bg-white">
            <form id="loginForm">
              <div class="mb-3">
                <label for="username" class="form-label fw-bold">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" class="form-control" id="username" name="username" required placeholder="กรุณากรอกชื่อผู้ใช้งาน">
              </div>
              <div class="mb-3">
                <label for="password" class="form-label fw-bold">รหัสผ่าน (Password)</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="กรุณากรอกรหัสผ่าน">
              </div>
              <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ
              </button>
              <a href="/" class="btn btn-outline-secondary w-100">
                <i class="bi bi-map me-2"></i>กลับหน้าแผนที่
              </a>
            </form>
            <div class="text-center mt-3">
              <button type="button" class="btn btn-link text-decoration-none" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal" style="color: var(--gov-blue);">
                <i class="bi bi-question-circle me-1"></i>กรณีลืมรหัสผ่าน
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">
            <i class="bi bi-key me-2"></i>ขอตั้งค่ารหัสผ่านใหม่
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="forgotMessage"></div>
          <form id="forgotPasswordForm">
            <div class="mb-3">
              <label for="forgotUsername" class="form-label">ชื่อผู้ใช้</label>
              <input type="text" class="form-control" id="forgotUsername" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              ขอรีเซ็ตรหัสผ่าน
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div class="modal fade" id="resetPasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">
            <i class="bi bi-lock-fill me-2"></i>ตั้งค่ารหัสผ่านใหม่
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="resetMessage"></div>
          <form id="resetPasswordForm">
            <div class="mb-3">
              <label for="resetToken" class="form-label">Token (ที่ได้รับจากแอดมิน)</label>
              <input type="text" class="form-control" id="resetToken" required placeholder="วาง token ที่นี่">
            </div>
            <div class="mb-3">
              <label for="newPassword" class="form-label">รหัสผ่านใหม่</label>
              <input type="password" class="form-control" id="newPassword" required placeholder="กรอกรหัสผ่านใหม่">
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">ยืนยันรหัสผ่าน</label>
              <input type="password" class="form-control" id="confirmPassword" required placeholder="ยืนยันรหัสผ่านใหม่">
            </div>
            <button type="submit" class="btn btn-primary w-100">
              ตั้งค่ารหัสผ่านใหม่
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    // Login Form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          window.location.href = data.redirect || '/';
        } else {
          Swal.fire({
            icon: 'error',
            title: 'เข้าสู่ระบบไม่สำเร็จ',
            text: data.error || 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง',
            confirmButtonText: 'ตกลง',
            confirmButtonColor: '#003366'
          });
        }
      } catch (err) {
        console.error(err);
        Swal.fire({
          icon: 'error',
          title: 'เกิดข้อผิดพลาด',
          text: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้',
          confirmButtonText: 'ตกลง',
          confirmButtonColor: '#003366'
        });
      }
    });

    // Forgot Password
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('forgotUsername').value;
      
      try {
        const response = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          const messageDiv = document.getElementById('forgotMessage');
          messageDiv.innerHTML = `
            <div class="alert alert-success alert-dismissible fade show" role="alert">
              <i class="bi bi-check-circle me-2"></i>
              <strong>สำเร็จ!</strong> โปรแกรมได้สร้าง token ให้แล้ว
              <br>กรุณาติดต่อแอดมิน หรือ กดปุ่มด้านล่างเพื่อตั้งค่ารหัสผ่าน
              <br><strong>Token:</strong> <code>${data.token}</code>
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <button type="button" class="btn btn-info w-100 mt-3" data-bs-dismiss="modal" 
                    onclick="showResetModal('${data.token}')">
              ตั้งค่ารหัสผ่านเลย
            </button>
          `;
        } else {
          document.getElementById('forgotMessage').innerHTML = 
            `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>${data.error}</div>`;
        }
      } catch (err) {
        console.error(err);
        document.getElementById('forgotMessage').innerHTML = 
          '<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>เกิดข้อผิดพลาด</div>';
      }
    });

    // Reset Password
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('resetToken').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (newPassword !== confirmPassword) {
        document.getElementById('resetMessage').innerHTML = 
          '<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>รหัสผ่านไม่ตรงกัน</div>';
        return;
      }
      
      try {
        const response = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          document.getElementById('resetMessage').innerHTML = `
            <div class="alert alert-success alert-dismissible fade show" role="alert">
              <i class="bi bi-check-circle me-2"></i>
              <strong>สำเร็จ!</strong> รหัสผ่านได้รับการตั้งค่าใหม่แล้ว
              <br>กรุณา <a href="/login">เข้าสู่ระบบ</a> อีกครั้ง
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          `;
          document.getElementById('resetPasswordForm').reset();
        } else {
          document.getElementById('resetMessage').innerHTML = 
            `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>${data.error}</div>`;
        }
      } catch (err) {
        console.error(err);
        document.getElementById('resetMessage').innerHTML = 
          '<div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>เกิดข้อผิดพลาด</div>';
      }
    });

    function showResetModal(token) {
      document.getElementById('resetToken').value = token;
      const forgotModal = bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal'));
      forgotModal.hide();
      const resetModal = new bootstrap.Modal(document.getElementById('resetPasswordModal'));
      resetModal.show();
    }
  </script>
</body>
</html>
