version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"

  web:
    build: .
    ports:
      - "2025:2025"
    depends_on:
      - db
    environment:
      - NODE_ENV=production